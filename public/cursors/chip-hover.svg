<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
  <!-- Hover state: the chip flips to its bright face -->
  <circle cx="14" cy="14" r="13" fill="#E3B85A" stroke="#0C0A06" stroke-width="1"/>
  <g fill="#14100A">
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4"/>
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4" transform="rotate(60 14 14)"/>
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4" transform="rotate(120 14 14)"/>
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4" transform="rotate(180 14 14)"/>
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4" transform="rotate(240 14 14)"/>
    <rect x="11.5" y="1.4" width="5" height="3.4" rx="1.4" transform="rotate(300 14 14)"/>
  </g>
  <circle cx="14" cy="14" r="8.2" fill="#F9F8F3" stroke="#14100A" stroke-width="0.8"/>
  <text x="14" y="17" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="bold" fill="#14100A" text-anchor="middle">16</text>
</svg>
